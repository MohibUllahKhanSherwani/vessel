services:
  redis:
    image: redis:7-alpine
    container_name: vessel-redis
    ports:
      - "6379:6379"

  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: vessel-postgres-test
    environment:
      POSTGRES_DB: vessel_test
      POSTGRES_USER: vessel
      POSTGRES_PASSWORD: vessel
    ports:
      - "5433:5432"